<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Sainiwalaa Studio | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; transition: 0.3s; }
        .auth-card { background: #121212; border: 1px solid #262626; border-radius: 12px; padding: 25px; width: 100%; max-width: 350px; }
        .ig-input { background: #1a1a1a; border: 1px solid #363636; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 10px; color: #fff; font-size: 14px; outline: none; }
        .ig-input:focus { border-color: #555; }
        .btn-primary { background: #0095f6; color: white; font-weight: bold; padding: 10px; width: 100%; border-radius: 6px; margin-top: 10px; active:opacity-70; }
        .link-text { color: #0095f6; font-size: 13px; cursor: pointer; font-weight: 600; }
        .hidden { display: none !important; }
        #loader { height: 3px; background: #0095f6; width: 0%; position: fixed; top: 0; left: 0; z-index: 9999; transition: 0.4s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="loader"></div>

    <div id="auth-section" class="flex flex-col items-center">
        <h1 class="text-3xl font-bold italic mb-8 tracking-widest">SAINIWALAA</h1>
        
        <div id="login-form" class="auth-card">
            <input type="email" id="login-email" class="ig-input" placeholder="ईमेल (Email)">
            <input type="password" id="login-pass" class="ig-input" placeholder="पासवर्ड (Password)">
            <button onclick="handleLogin()" class="btn-primary">Log In</button>
            <div class="mt-4 text-center">
                <p class="text-xs text-zinc-500">Don't have an account? <span class="link-text" onclick="showAuth('register')">Sign Up</span></p>
                <p class="text-xs text-zinc-500 mt-2"><span class="link-text" onclick="showAuth('reset')">Forgot Password?</span></p>
            </div>
        </div>

        <div id="register-form" class="auth-card hidden">
            <input type="text" id="reg-name" class="ig-input" placeholder="पूरा नाम (Full Name)">
            <input type="email" id="reg-email" class="ig-input" placeholder="ईमेल (Email)">
            <input type="password" id="reg-pass" class="ig-input" placeholder="पासवर्ड (Password)">
            <button onclick="handleRegister()" class="btn-primary">Register</button>
            <p class="mt-4 text-center text-xs text-zinc-500">Already have an account? <span class="link-text" onclick="showAuth('login')">Log In</span></p>
        </div>

        <div id="reset-form" class="auth-card hidden">
            <p class="text-xs text-zinc-400 mb-4 text-center">अपना ईमेल डालें, हम पासवर्ड रीसेट लिंक भेजेंगे।</p>
            <input type="email" id="reset-email" class="ig-input" placeholder="Your Email">
            <button onclick="handleReset()" class="btn-primary">Send Reset Link</button>
            <p class="mt-4 text-center text-xs link-text" onclick="showAuth('login')">Back to Login</p>
        </div>
    </div>

    <div id="app-section" class="hidden fixed inset-0 bg-black overflow-y-auto">
        <header class="p-4 border-b border-zinc-900 flex justify-between items-center bg-black sticky top-0">
            <span class="font-bold text-xl" id="display-shop">Studio</span>
            <button onclick="logout()" class="text-red-500 font-bold text-sm">Logout</button>
        </header>
        
        <div class="p-6 text-center">
            <img id="display-pic" src="" class="w-24 h-24 rounded-full mx-auto border-2 border-zinc-800 mb-4">
            <h2 id="display-name" class="text-xl font-bold">---</h2>
            <p id="display-email" class="text-zinc-500 text-sm">---</p>
            <div class="mt-10 p-10 bg-zinc-900 rounded-xl border border-zinc-800">
                <p class="text-zinc-400">Welcome to your secure Dashboard!</p>
                <p class="text-[10px] mt-2 opacity-30">UID: <span id="display-uid"></span></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // Firebase Config (Your Project)
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- Auth State Monitor ---
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loader');
            loader.style.width = "100%";
            setTimeout(() => {
                loader.style.width = "0%";
                if (user) {
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('app-section').classList.remove('hidden');
                    loadUserData(user);
                } else {
                    document.getElementById('auth-section').classList.remove('hidden');
                    document.getElementById('app-section').classList.add('hidden');
                }
            }, 800);
        });

        // --- Logic: Switch Forms ---
        function showAuth(type) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById(type + '-form').classList.remove('hidden');
        }

        // --- Action: Register ---
        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !email || !pass) return alert("All fields are required!");

            auth.createUserWithEmailAndPassword(email, pass)
                .then(res => {
                    db.ref('users/' + res.user.uid).set({
                        uid: res.user.uid,
                        name: name,
                        email: email,
                        shopName: name.split(' ')[0] + " Studio",
                        pic: "https://cdn-icons-png.flaticon.com/512/149/149071.png"
                    });
                    alert("Registration Successful!");
                })
                .catch(err => alert(err.message));
        }

        // --- Action: Login ---
        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
        }

        // --- Action: Reset Password ---
        function handleReset() {
            const email = document.getElementById('reset-email').value;
            if(!email) return alert("Please enter email");
            auth.sendPasswordResetEmail(email)
                .then(() => alert("Reset Link Sent! Check your email inbox."))
                .catch(err => alert(err.message));
        }

        // --- Action: Logout ---
        function logout() { auth.signOut(); }

        // --- Load User Profile Data ---
        function loadUserData(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                if(data) {
                    document.getElementById('display-name').innerText = data.name;
                    document.getElementById('display-email').innerText = data.email;
                    document.getElementById('display-pic').src = data.pic;
                    document.getElementById('display-shop').innerText = data.shopName;
                    document.getElementById('display-uid').innerText = data.uid;
                }
            });
        }
    </script>
</body>
</html>
