<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Sainiwalaa Creator & Public Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#fafafa}
.header{background:white;padding:15px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd;align-items:center}
.header b{font-size:18px}
.container{max-width:600px;margin:auto;background:white;padding-bottom:50px}
.profile{padding:20px;text-align:center}
.avatar{width:90px;height:90px;border-radius:50%;object-fit:cover}
button{padding:10px 15px;margin:5px;border:1px solid #ccc;background:white;border-radius:6px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:30px}
.post{height:120px;background-size:cover;background-position:center;position:relative;cursor:pointer}
.post span{position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,0.5);color:white;font-size:10px;padding:1px 3px;border-radius:3px}
.info{font-size:12px;color:#777;margin-top:10px;text-align:center}
.nav{display:flex;justify-content:center;gap:10px;margin:10px 0}
.nav button{font-size:12px;padding:5px 10px}
</style>
</head>
<body>

<div class="header">
<b>Sainiwalaa</b>
<div>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="nav">
<button onclick="showCreator()">Creator Dashboard</button>
<button onclick="showPublicFeed()">Public Feed</button>
</div>

<div class="container" id="creatorSection">
  <div class="profile">
    <img id="avatar" class="avatar" src="https://via.placeholder.com/90">
    <h3 id="name">Creator</h3>
    <button onclick="uploadPost()">Upload Post</button>
    <div class="info">
      <span id="uid"></span>
    </div>
  </div>
  <div class="grid" id="postGrid"></div>
</div>

<div class="container" id="publicFeed" style="display:none">
  <h3 style="text-align:center">Public Feed</h3>
  <div class="grid" id="publicGrid"></div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*" style="display:none">

<!-- Firebase JS SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
  authDomain: "sainiwalaainfulencer.firebaseapp.com",
  databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
  projectId: "sainiwalaainfulencer",
  storageBucket: "sainiwalaainfulencer.firebasestorage.app",
  messagingSenderId: "116125275008",
  appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const storage = firebase.storage();
const db = firebase.database();

// Google Apps Script API for Sheet sync
const API="https://script.google.com/macros/s/AKfycbxSg4X4HYjUoX9rfmnjU9lBUyv0aKtJB_pAp0K9z3A5NMHrhASg3aTNz-H3JnOa1twurA/exec";

// --- Login/Logout ---
function login(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function logout(){ auth.signOut(); }

// --- Sections Toggle ---
function showCreator(){ document.getElementById("creatorSection").style.display="block"; document.getElementById("publicFeed").style.display="none"; }
function showPublicFeed(){ document.getElementById("creatorSection").style.display="none"; document.getElementById("publicFeed").style.display="block"; }

// --- Auth listener ---
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("name").innerText=user.displayName;
    document.getElementById("avatar").src=user.photoURL;
    document.getElementById("uid").innerText="UID: "+user.uid;
    loadProfile(user.uid);
    loadCreatorPosts(user.uid);
    loadPublicFeed();
  } else {
    document.getElementById("name").innerText="Creator";
    document.getElementById("avatar").src="https://via.placeholder.com/90";
    document.getElementById("uid").innerText="";
    document.getElementById("postGrid").innerHTML="";
    document.getElementById("publicGrid").innerHTML="";
  }
});

// --- Load user profile from Sheet API ---
function loadProfile(uid){
  fetch(API).then(r=>r.json()).then(data=>{
    data.forEach(row=>{
      if(row[0]==uid) document.getElementById("name").innerText=row[3]||"Creator";
    })
  });
}

// --- Upload post ---
function uploadPost(){ document.getElementById("fileInput").click(); }
document.getElementById("fileInput").addEventListener("change",function(){
  const file=this.files[0], user=auth.currentUser;
  if(!file||!user) return;

  const ref=storage.ref("posts/"+user.uid+"/"+Date.now());
  ref.put(file).then(s=>{
    s.ref.getDownloadURL().then(url=>{
      const id=Date.now();
      const postData={
        uid:user.uid,
        media:url,
        timestamp:new Date().toISOString()
      };
      db.ref("posts/"+id).set(postData);
      showPost(url,true); // show in creator
      showPost(url,false); // show in public feed
    });
  });
});

// --- Show post ---
function showPost(url,isCreator=true){
  const grid=isCreator?document.getElementById("postGrid"):document.getElementById("publicGrid");
  const post=document.createElement("div");
  post.className="post";
  post.style.backgroundImage="url("+url+")";
  if(!isCreator) post.title="Public Post";
  grid.prepend(post);
}

// --- Load creator posts ---
function loadCreatorPosts(uid){
  db.ref("posts").orderByChild("uid").equalTo(uid).on("value",snap=>{
    const grid=document.getElementById("postGrid");
    grid.innerHTML="";
    snap.forEach(p=> showPost(p.val().media,true));
  });
}

// --- Load public feed ---
function loadPublicFeed(){
  db.ref("posts").orderByChild("timestamp").limitToLast(10).on("value",snap=>{
    const grid=document.getElementById("publicGrid");
    grid.innerHTML="";
    let arr=[];
    snap.forEach(p=>arr.push(p.val().media));
    arr.reverse().forEach(url=>showPost(url,false));
  });
}
</script>
</body>
</html>
