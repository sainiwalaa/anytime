<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Sainiwalaa | Creator Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .ig-input { background: #121212; border: 1px solid #363636; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; color: #fff; outline: none; font-size: 14px; transition: 0.3s; }
        .ig-input:focus { border-color: #0095f6; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 95%; background: #121212; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .post-btn-active { background: #0095f6; color: white; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; transition: 0.3s; }
        .post-btn-active:disabled { background: #262626; color: #8e8e8e; cursor: not-allowed; }
        #loader { height: 3px; background: #0095f6; width: 0%; position: fixed; top: 0; left: 0; z-index: 9999; transition: 0.3s; }
        .divider { display: flex; align-items: center; text-align: center; color: #555; font-size: 12px; margin: 10px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <div id="auth-layer" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl italic font-bold mb-10 tracking-widest">SAINIWALAA</h1>
        <button onclick="login()" class="w-full max-w-xs bg-white text-black font-bold p-3 rounded-lg flex items-center justify-center gap-3 active:scale-95 transition">
            <i class="fa-brands fa-google"></i> Login with Google
        </button>
    </div>

    <div id="app" class="hidden">
        <header class="p-4 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black z-50">
            <span class="font-bold text-lg" id="shop-label">Shop Name</span>
            <div class="flex gap-4">
                <i class="fa-regular fa-square-plus text-2xl cursor-pointer" onclick="openModal('upload-modal')"></i>
                <i class="fa-solid fa-power-off text-red-500 text-xl cursor-pointer" onclick="logout()"></i>
            </div>
        </header>

        <div id="feed-section" class="grid grid-cols-3 gap-0.5 pb-20"></div>
    </div>

    <div id="upload-modal" class="modal">
        <div class="flex justify-between items-center mb-6">
            <span onclick="closeModal('upload-modal')" class="text-zinc-400 cursor-pointer">Cancel</span>
            <b class="text-lg">New Post</b>
            <div class="w-10"></div> </div>
        
        <div class="space-y-1">
            <div class="flex gap-2 mb-4">
                <div class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg p-3 text-center relative">
                    <input type="file" id="post-file" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(this)"/>
                    <label for="post-file" id="upload-label" class="cursor-pointer block">
                        <i class="fa-solid fa-cloud-arrow-up text-xl mb-1"></i>
                        <p class="text-[10px]">Upload File</p>
                    </label>
                </div>
                <div class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg p-3 text-center">
                    <i class="fa-solid fa-link text-xl mb-1"></i>
                    <p class="text-[10px]">Direct Link</p>
                </div>
            </div>

            <input id="post-videoUrl" class="ig-input" placeholder="Or Paste Video/Image URL here..."/>
            
            <div class="divider">Product Details</div>
            
            <input id="post-productName" class="ig-input" placeholder="Product Name"/>
            <input id="post-price" class="ig-input" placeholder="Price (₹)"/>
            
            <select id="post-platform" class="ig-input">
                <option value="Amazon">Amazon</option>
                <option value="Meesho">Meesho</option>
                <option value="Flipkart">Flipkart</option>
                <option value="Other">Other</option>
            </select>

            <input id="post-productLink" class="ig-input" placeholder="Affiliate/Product Link"/>
            <textarea id="post-description" class="ig-input h-24" placeholder="Write description..."></textarea>
            
            <input id="post-shopName" class="ig-input opacity-50" placeholder="Shop Name" readonly/>

            <button onclick="savePost()" id="post-btn" class="post-btn-active mt-4">
                Post Now
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        let uploadedFileUrl = "";

        // Auth
        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                syncUserData(user);
                loadFeed();
            }
        });

        function syncUserData(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                const shop = data?.shopName || user.displayName.split(' ')[0] + " Studio";
                document.getElementById('shop-label').innerText = shop;
                document.getElementById('post-shopName').value = shop;
            });
        }

        // Handle File Upload
        function handleFileUpload(input) {
            const file = input.files[0];
            if(!file) return;

            const ldr = document.getElementById('loader');
            const label = document.getElementById('upload-label');
            const btn = document.getElementById('post-btn');

            btn.disabled = true; // Upload ke waqt button lock
            ldr.style.width = "40%";
            label.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-xl"></i><p class="text-[10px]">Uploading...</p>`;

            const ref = storage.ref('posts/' + Date.now() + "_" + file.name);
            ref.put(file).then(s => s.ref.getDownloadURL().then(url => {
                uploadedFileUrl = url;
                document.getElementById('post-videoUrl').value = url;
                label.innerHTML = `<i class="fa-solid fa-circle-check text-green-500 text-xl"></i><p class="text-[10px]">Done</p>`;
                ldr.style.width = "100%";
                btn.disabled = false;
                setTimeout(() => ldr.style.width = "0%", 1000);
            }));
        }

        // Save Post Logic
        function savePost() {
            const btn = document.getElementById('post-btn');
            const vidUrl = document.getElementById('post-videoUrl').value;
            const prodName = document.getElementById('post-productName').value;

            if(!vidUrl || !prodName) return alert("Video URL and Product Name are required!");

            // 1. Button Block (Response logic)
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Posting...`;

            const postId = "POST_" + Date.now();
            const postData = {
                postId: postId,
                uid: auth.currentUser.uid,
                shopName: document.getElementById('post-shopName').value,
                videoUrl: vidUrl,
                productName: prodName,
                price: document.getElementById('post-price').value,
                platform: document.getElementById('post-platform').value,
                productLink: document.getElementById('post-productLink').value,
                description: document.getElementById('post-description').value,
                timestamp: new Date().toISOString()
            };

            // Firebase me save karein
            db.ref('posts/' + postId).set(postData).then(() => {
                alert("Post successfully published!");
                closeModal('upload-modal');
                location.reload();
            }).catch(err => {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Post Now";
            });
        }

        function loadFeed() {
            db.ref('posts').orderByChild('uid').equalTo(auth.currentUser.uid).on('value', snap => {
                const feed = document.getElementById('feed-section');
                feed.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    const isVideo = p.videoUrl.match(/\.(mp4|webm|ogg)/) || p.videoUrl.includes('video');
                    feed.innerHTML += `
                        <div class="aspect-square bg-zinc-900 border border-zinc-800 overflow-hidden relative">
                            ${isVideo ? `<video src="${p.videoUrl}" class="w-full h-full object-cover"></video>` : `<img src="${p.videoUrl}" class="w-full h-full object-cover"/>`}
                            <div class="absolute bottom-1 left-1 bg-black/60 text-[8px] px-1 rounded">₹${p.price}</div>
                        </div>`;
                });
            });
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
