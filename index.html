<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Sainiwalaa Creator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#fafafa}
.header{background:white;padding:15px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd}
.container{max-width:600px;margin:auto;background:white}
.profile{padding:20px;text-align:center}
.avatar{width:90px;height:90px;border-radius:50%;object-fit:cover}
button{padding:10px 15px;margin:5px;border:1px solid #ccc;background:white;border-radius:6px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:30px}
.post{height:120px;background-size:cover;background-position:center}
.info{font-size:12px;color:#777;margin-top:10px}
</style>
</head>
<body>

<div class="header">
<b>Sainiwalaa</b>
<div>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="container">
<div class="profile">
<img id="avatar" class="avatar" src="https://via.placeholder.com/90">
<h3 id="name">Creator</h3>
<button onclick="uploadPost()">Upload Post</button>
<div class="info">
<span id="uid"></span>
</div>
</div>

<div class="grid" id="postGrid"></div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*" style="display:none">

<!-- Firebase JS SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
  authDomain: "sainiwalaainfulencer.firebaseapp.com",
  databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
  projectId: "sainiwalaainfulencer",
  storageBucket: "sainiwalaainfulencer.firebasestorage.app",
  messagingSenderId: "116125275008",
  appId: "1:116125275008:web:dc09ab0c6ce0317436e765",
  measurementId: "G-VCKE3S9S14"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const storage = firebase.storage();
const db = firebase.database();

// Google Apps Script API
const API="https://script.google.com/macros/s/AKfycbxSg4X4HYjUoX9rfmnjU9lBUyv0aKtJB_pAp0K9z3A5NMHrhASg3aTNz-H3JnOa1twurA/exec";

// Login/Logout
function login(){ const provider=new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(provider); }
function logout(){ auth.signOut(); }

// Auth listener
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("name").innerText=user.displayName;
    document.getElementById("avatar").src=user.photoURL;
    document.getElementById("uid").innerText="UID: "+user.uid;
    loadUserPosts(user.uid);
  } else {
    document.getElementById("name").innerText="Creator";
    document.getElementById("avatar").src="https://via.placeholder.com/90";
    document.getElementById("uid").innerText="";
    document.getElementById("postGrid").innerHTML="";
  }
});

// Upload post
function uploadPost(){ document.getElementById("fileInput").click(); }

document.getElementById("fileInput").addEventListener("change", function(){
  const file=this.files[0];
  const user=auth.currentUser;
  if(!file||!user) return;

  const ref=storage.ref("posts/"+user.uid+"/"+Date.now());
  ref.put(file).then(snapshot=>{
    snapshot.ref.getDownloadURL().then(url=>{
      const postId=Date.now();
      // Push post metadata to Firebase DB
      db.ref("posts/"+postId).set({
        uid:user.uid,
        media:url,
        timestamp:postId
      });
      // Also push to Sheet API
      fetch(`${API}?action=savePost&uid=${user.uid}&media=${encodeURIComponent(url)}`);
      showPost(url);
    });
  });
});

// Show post
function showPost(url){
  const grid=document.getElementById("postGrid");
  const post=document.createElement("div");
  post.className="post";
  post.style.backgroundImage="url("+url+")";
  grid.prepend(post);
}

// Load posts for user
function loadUserPosts(uid){
  db.ref("posts").orderByChild("timestamp").on("value",snap=>{
    const grid=document.getElementById("postGrid");
    grid.innerHTML="";
    const posts=[];
    snap.forEach(p=>{ if(p.val().uid==uid) posts.push(p.val()); });
    posts.sort((a,b)=>b.timestamp-a.timestamp); // newest first
    posts.forEach(p=>showPost(p.media));
  });
}
</script>
</body>
</html>
