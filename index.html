<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sainiwalaa Creator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{margin:0;font-family:Arial;background:#fafafa}

.header{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
}

.container{
max-width:600px;
margin:auto;
background:white;
}

.profile-top{
display:flex;
padding:20px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-right:20px;
}

.stats{
display:flex;
gap:20px;
margin-top:10px;
}

.bio{padding:0 20px 20px}

.buttons{
display:flex;
gap:10px;
padding:0 20px 20px;
}

button{
padding:8px 15px;
border:1px solid #ccc;
background:white;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.post{
background:#ddd;
height:120px;
background-size:cover;
background-position:center;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
padding:10px;
}

</style>
</head>

<body>

<div class="header">
<b>Sainiwalaa</b>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="profile-top">

<img id="avatar" class="avatar" src="https://via.placeholder.com/90">

<div>

<h3 id="shopname">Creator</h3>

<div class="stats">
<div><b id="posts">0</b><br>posts</div>
<div><b>0</b><br>followers</div>
<div><b>0</b><br>following</div>
</div>

</div>
</div>

<div class="bio">

<b id="name">Creator</b>
<p id="bio">Welcome</p>

</div>

<div class="buttons">

<button onclick="editProfile()">Edit</button>
<button onclick="uploadPost()">Upload</button>
<button onclick="share()">Share</button>

</div>

<div class="grid" id="postGrid"></div>

</div>

<div class="footer">
<div>🏠</div>
<div>🔍</div>
<div onclick="uploadPost()">➕</div>
<div>❤️</div>
<div>👤</div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*" style="display:none">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
authDomain: "sainiwalaainfulencer.firebaseapp.com",
databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
projectId: "sainiwalaainfulencer",
storageBucket: "sainiwalaainfulencer.firebasestorage.app",
messagingSenderId: "116125275008",
appId: "1:116125275008:web:dc09ab0c6ce0317436e765",
measurementId: "G-VCKE3S9S14"

};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const storage=firebase.storage();
const db=firebase.database();

const API="https://script.google.com/macros/s/AKfycbxJVZqW9tPedLvSpYNoVWMy5HF43mlsZCpRoswdcXheYk5BnTY_1FhHzV49DWzJm1v8LQ/exec";

auth.onAuthStateChanged(user=>{

if(user){

loadProfile(user.uid)
loadPosts()

}else{

alert("Login required")

}

})


function loadProfile(uid){

fetch(API)

.then(res=>res.json())

.then(data=>{

data.forEach(row=>{

if(row[0]==uid){

document.getElementById("shopname").innerText=row[3]
document.getElementById("name").innerText=row[3]
document.getElementById("bio").innerText=row[9]||"Welcome"

}

})

})

}


function uploadPost(){

document.getElementById("fileInput").click()

}


document.getElementById("fileInput").addEventListener("change",function(){

const file=this.files[0]
const user=firebase.auth().currentUser

if(!file || !user)return

const ref=storage.ref("posts/"+user.uid+"/"+Date.now()+"_"+file.name)

ref.put(file).then(s=>{

s.ref.getDownloadURL().then(url=>{

const id=Date.now()

db.ref("posts/"+id).set({

uid:user.uid,
media:url,
time:id

})

showPost(url)

})

})

})


function showPost(url){

const grid=document.getElementById("postGrid")

const post=document.createElement("div")

post.className="post"

post.style.backgroundImage="url("+url+")"

grid.prepend(post)

document.getElementById("posts").innerText=grid.children.length

}


function loadPosts(){

db.ref("posts").on("value",snap=>{

const grid=document.getElementById("postGrid")

grid.innerHTML=""

snap.forEach(p=>{

showPost(p.val().media)

})

})

}


function editProfile(){

alert("Edit profile page")

}


function share(){

if(navigator.share){

navigator.share({

title:"My Creator Profile",
url:location.href

})

}

}


function logout(){

auth.signOut()
location.reload()

}

</script>

</body>
</html>
