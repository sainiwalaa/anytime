<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sainiwalaa Creator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{margin:0;font-family:Arial;background:#fafafa}

.header{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
}

.container{
max-width:600px;
margin:auto;
background:white;
}

.profile{
padding:20px;
text-align:center;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
}

button{
padding:10px 15px;
margin:5px;
border:1px solid #ccc;
background:white;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.post{
height:120px;
background-size:cover;
background-position:center;
}

</style>
</head>

<body>

<div class="header">
<b>Sainiwalaa</b>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="profile">

<img id="avatar" class="avatar" src="https://via.placeholder.com/90">

<h3 id="name">Creator</h3>

<button onclick="login()">Login</button>

<button onclick="uploadPost()">Upload</button>

</div>

<div class="grid" id="postGrid"></div>

</div>

<input type="file" id="fileInput" style="display:none">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
authDomain: "sainiwalaainfulencer.firebaseapp.com",
databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
projectId: "sainiwalaainfulencer",
storageBucket: "sainiwalaainfulencer.firebasestorage.app",
messagingSenderId: "116125275008",
appId: "1:116125275008:web:dc09ab0c6ce0317436e765"

};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const storage=firebase.storage();
const db=firebase.database();

function login(){

const provider=new firebase.auth.GoogleAuthProvider()

auth.signInWithPopup(provider)

}

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("name").innerText=user.displayName

document.getElementById("avatar").src=user.photoURL

loadPosts()

}

})

function uploadPost(){

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").addEventListener("change",function(){

const file=this.files[0]

const user=auth.currentUser

if(!file||!user)return

const ref=storage.ref("posts/"+user.uid+"/"+Date.now())

ref.put(file).then(s=>{

s.ref.getDownloadURL().then(url=>{

const id=Date.now()

db.ref("posts/"+id).set({

uid:user.uid,
media:url

})

showPost(url)

})

})

})

function showPost(url){

const grid=document.getElementById("postGrid")

const post=document.createElement("div")

post.className="post"

post.style.backgroundImage="url("+url+")"

grid.prepend(post)

}

function loadPosts(){

db.ref("posts").on("value",snap=>{

const grid=document.getElementById("postGrid")

grid.innerHTML=""

snap.forEach(p=>{

showPost(p.val().media)

})

})

}

function logout(){

auth.signOut()

}

</script>

</body>
</html>
