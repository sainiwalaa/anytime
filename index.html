<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Sainiwalaa | Creator Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .ig-input { background: #121212; border: 1px solid #363636; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; color: #fff; outline: none; font-size: 14px; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 95%; background: #121212; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .tab-btn { flex: 1; text-align: center; padding: 12px; border-bottom: 2px solid transparent; opacity: 0.5; cursor: pointer; }
        .tab-btn.active { border-bottom-color: #fff; opacity: 1; }
        #loader { height: 3px; background: #0095f6; width: 0%; position: fixed; top: 0; left: 0; z-index: 9999; transition: 0.3s; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; z-index: 10; }
        .profile-banner { height: 120px; background: linear-gradient(45deg, #121212, #333); border-radius: 12px; position: relative; overflow: hidden; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #000; position: absolute; bottom: -40px; left: 20px; background: #222; object-fit: cover; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <div id="auth-layer" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl italic font-bold mb-10 tracking-widest text-white">SAINIWALAA</h1>
        <button onclick="login()" class="w-full max-w-xs bg-white text-black font-bold p-3 rounded-lg flex items-center justify-center gap-3 active:scale-95 transition">
            <i class="fa-brands fa-google"></i> Login with Google
        </button>
    </div>

    <div id="app" class="hidden">
        <header class="p-4 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black z-50">
            <span class="font-bold text-lg" id="shop-label-header">Shop Name</span>
            <div class="flex gap-4">
                <i class="fa-regular fa-square-plus text-2xl cursor-pointer" onclick="openModal('upload-modal')"></i>
                <i class="fa-solid fa-power-off text-red-500 text-xl cursor-pointer" onclick="logout()"></i>
            </div>
        </header>

        <div class="flex border-b border-zinc-900 sticky top-[60px] bg-black z-40">
            <div id="tab-feed" class="tab-btn active" onclick="switchTab('feed')"><i class="fa-solid fa-table-cells text-xl"></i></div>
            <div id="tab-orders" class="tab-btn" onclick="switchTab('orders')"><i class="fa-solid fa-cart-shopping text-xl"></i></div>
            <div id="tab-profile" class="tab-btn" onclick="switchTab('profile')"><i class="fa-regular fa-user text-xl"></i></div>
        </div>

        <div id="section-feed" class="grid grid-cols-3 gap-0.5 pb-20"></div>

        <div id="section-orders" class="hidden p-4 pb-20 text-center">
            <h3 class="text-zinc-500 mt-10">No Orders Found</h3>
        </div>

        <div id="section-profile" class="hidden p-4 pb-20">
            <div class="profile-banner mb-12">
                <img id="p-banner-img" src="" class="w-full h-full object-cover hidden">
                <img id="p-user-img" src="" class="profile-pic">
            </div>
            
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 id="p-name" class="text-2xl font-bold">---</h2>
                    <p id="p-email" class="text-xs text-zinc-500">---</p>
                </div>
                <button onclick="openModal('edit-profile-modal')" class="bg-zinc-900 border border-zinc-700 px-4 py-1.5 rounded-lg text-sm font-bold">Edit Profile</button>
            </div>

            <p id="p-bio" class="text-sm text-zinc-300 mb-4 italic">No bio added yet.</p>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-zinc-900 p-3 rounded-lg border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 uppercase">Shop Name</p>
                    <p id="p-shopName" class="text-sm font-bold">---</p>
                </div>
                <div class="bg-zinc-900 p-3 rounded-lg border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 uppercase">Contact</p>
                    <p id="p-contact" class="text-sm font-bold">---</p>
                </div>
                <div class="bg-zinc-900 p-3 rounded-lg border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 uppercase">City</p>
                    <p id="p-city" class="text-sm font-bold">---</p>
                </div>
                <div class="bg-zinc-900 p-3 rounded-lg border border-zinc-800">
                    <p class="text-[10px] text-zinc-500 uppercase">Influence</p>
                    <p id="p-influence" class="text-sm font-bold text-blue-400">---</p>
                </div>
            </div>

            <div class="space-y-2 border-t border-zinc-900 pt-4">
                <div id="p-social-1" class="flex items-center gap-3 text-sm opacity-70"><i class="fa-brands fa-instagram"></i> <span>Not Linked</span></div>
                <div id="p-social-2" class="flex items-center gap-3 text-sm opacity-70"><i class="fa-brands fa-youtube"></i> <span>Not Linked</span></div>
                <div id="p-social-3" class="flex items-center gap-3 text-sm opacity-70"><i class="fa-solid fa-globe"></i> <span>Not Linked</span></div>
            </div>

            <div class="mt-6 text-[10px] text-zinc-700">
                <p>UID: <span id="p-uid">---</span></p>
                <p>Member Since: <span id="p-createdAt">---</span></p>
            </div>
        </div>
    </div>

    <div id="upload-modal" class="modal">
        <div class="flex justify-between items-center mb-6">
            <span onclick="closeModal('upload-modal')" class="text-zinc-400 cursor-pointer">Cancel</span>
            <b class="text-lg">New Post</b>
            <button onclick="savePost()" id="post-btn" class="text-[#0095f6] font-bold">Post</button>
        </div>
        <div class="space-y-2">
            <div class="flex gap-2">
                <div class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg p-3 text-center">
                    <input type="file" id="post-file" class="hidden" accept="image/*,video/*" onchange="handleFileUpload(this, 'post-videoUrl')"/>
                    <label for="post-file" id="upload-label" class="cursor-pointer block">
                        <i class="fa-solid fa-camera text-xl"></i>
                        <p class="text-[10px]">Upload</p>
                    </label>
                </div>
                <input id="post-videoUrl" class="flex-[2] ig-input mb-0" placeholder="Paste Media URL"/>
            </div>
            <input id="post-productName" class="ig-input" placeholder="Product Name"/>
            <input id="post-price" class="ig-input" placeholder="Price (₹)"/>
            <select id="post-platform" class="ig-input">
                <option value="Amazon">Amazon</option><option value="Meesho">Meesho</option><option value="Flipkart">Flipkart</option>
            </select>
            <input id="post-productLink" class="ig-input" placeholder="Product Link"/>
            <textarea id="post-description" class="ig-input h-20" placeholder="Description"></textarea>
        </div>
    </div>

    <div id="edit-profile-modal" class="modal">
        <div class="flex justify-between items-center mb-6">
            <span onclick="closeModal('edit-profile-modal')" class="text-zinc-400 cursor-pointer">Back</span>
            <b class="text-lg">Edit Profile</b>
            <button onclick="updateProfile()" id="update-btn" class="text-green-500 font-bold">Save</button>
        </div>
        <div class="space-y-3">
            <input id="edit-shopName" class="ig-input" placeholder="Shop Name"/>
            <textarea id="edit-bio" class="ig-input h-16" placeholder="Your Bio"></textarea>
            <input id="edit-contact" class="ig-input" placeholder="WhatsApp Number"/>
            <input id="edit-city" class="ig-input" placeholder="City"/>
            <select id="edit-influence" class="ig-input">
                <option value="Nano (0-10k)">Nano (0-10k)</option>
                <option value="Micro (10k-100k)">Micro (10k-100k)</option>
                <option value="Mega (100k+)">Mega (100k+)</option>
            </select>
            <div class="divider text-xs text-zinc-500">Social Links</div>
            <input id="edit-social-1" class="ig-input" placeholder="Instagram URL"/>
            <input id="edit-social-2" class="ig-input" placeholder="YouTube URL"/>
            <input id="edit-social-3" class="ig-input" placeholder="Website/Other"/>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                initUser(user);
                loadFeed(user.uid);
                loadOrders(user.uid);
            } else {
                document.getElementById('auth-layer').style.display = 'flex';
                document.getElementById('app').classList.add('hidden');
            }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { if(confirm("Logout?")) auth.signOut(); }

        // --- Profile Logic ---
        function initUser(user) {
            const userRef = db.ref('users/' + user.uid);
            userRef.on('value', snap => {
                const data = snap.val();
                if (!data) {
                    // Create New User entry
                    userRef.set({
                        uid: user.uid,
                        name: user.displayName,
                        email: user.email,
                        pic: user.photoURL,
                        shopName: user.displayName.split(' ')[0] + " Studio",
                        createdAt: new Date().toLocaleDateString(),
                        influence: 'Nano (0-10k)'
                    });
                } else {
                    // Fill Profile UI
                    document.getElementById('shop-label-header').innerText = data.shopName;
                    document.getElementById('p-name').innerText = data.name;
                    document.getElementById('p-email').innerText = data.email;
                    document.getElementById('p-user-img').src = data.pic;
                    document.getElementById('p-shopName').innerText = data.shopName;
                    document.getElementById('p-uid').innerText = data.uid;
                    document.getElementById('p-createdAt').innerText = data.createdAt;
                    document.getElementById('p-bio').innerText = data.bio || "No bio added yet.";
                    document.getElementById('p-contact').innerText = data.contact || "N/A";
                    document.getElementById('p-city').innerText = data.city || "N/A";
                    document.getElementById('p-influence').innerText = data.influence;

                    if(data.social1) document.getElementById('p-social-1').innerHTML = `<i class="fa-brands fa-instagram text-pink-500"></i> ${data.social1.split('/')[3] || 'Linked'}`;
                    if(data.social2) document.getElementById('p-social-2').innerHTML = `<i class="fa-brands fa-youtube text-red-500"></i> Linked`;
                    if(data.social3) document.getElementById('p-social-3').innerHTML = `<i class="fa-solid fa-globe text-blue-400"></i> Website`;

                    // Fill Edit Inputs
                    document.getElementById('edit-shopName').value = data.shopName;
                    document.getElementById('edit-bio').value = data.bio || "";
                    document.getElementById('edit-contact').value = data.contact || "";
                    document.getElementById('edit-city').value = data.city || "";
                    document.getElementById('edit-influence').value = data.influence;
                    document.getElementById('edit-social-1').value = data.social1 || "";
                    document.getElementById('edit-social-2').value = data.social2 || "";
                    document.getElementById('edit-social-3').value = data.social3 || "";
                }
            });
        }

        function updateProfile() {
            const btn = document.getElementById('update-btn');
            btn.innerText = "Saving...";
            db.ref('users/' + auth.currentUser.uid).update({
                shopName: document.getElementById('edit-shopName').value,
                bio: document.getElementById('edit-bio').value,
                contact: document.getElementById('edit-contact').value,
                city: document.getElementById('edit-city').value,
                influence: document.getElementById('edit-influence').value,
                social1: document.getElementById('edit-social-1').value,
                social2: document.getElementById('edit-social-2').value,
                social3: document.getElementById('edit-social-3').value,
            }).then(() => {
                btn.innerText = "Save";
                closeModal('edit-profile-modal');
            });
        }

        // --- Feed & Posts Logic (Restored) ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('#section-feed, #section-orders, #section-profile').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('section-' + tab).classList.remove('hidden');
        }

        function handleFileUpload(input, targetId) {
            const file = input.files[0];
            if(!file) return;
            const ldr = document.getElementById('loader');
            ldr.style.width = "50%";
            const ref = storage.ref('files/' + Date.now() + "_" + file.name);
            ref.put(file).then(s => s.ref.getDownloadURL().then(url => {
                document.getElementById(targetId).value = url;
                ldr.style.width = "100%";
                setTimeout(()=>ldr.style.width="0%", 1000);
            }));
        }

        function savePost() {
            const btn = document.getElementById('post-btn');
            const url = document.getElementById('post-videoUrl').value;
            if(!url) return alert("Select File");
            btn.disabled = true;
            const postId = "POST_" + Date.now();
            const data = {
                postId: postId, uid: auth.currentUser.uid,
                shopName: document.getElementById('p-shopName').innerText,
                videoUrl: url, productName: document.getElementById('post-productName').value,
                price: document.getElementById('post-price').value,
                platform: document.getElementById('post-platform').value,
                productLink: document.getElementById('post-productLink').value,
                description: document.getElementById('post-description').value,
                timestamp: Date.now()
            };
            db.ref('posts/' + postId).set(data).then(() => {
                closeModal('upload-modal');
                btn.disabled = false;
            });
        }

        function loadFeed(uid) {
            db.ref('posts').orderByChild('uid').equalTo(uid).on('value', snap => {
                const container = document.getElementById('section-feed');
                container.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    const isVid = p.videoUrl.includes(".mp4") || p.videoUrl.includes("video");
                    container.innerHTML += `
                        <div class="aspect-square relative border border-zinc-900 bg-zinc-900">
                            <button class="delete-btn" onclick="deletePost('${p.postId}')">Delete</button>
                            ${isVid ? `<video src="${p.videoUrl}" class="w-full h-full object-cover"></video>` : `<img src="${p.videoUrl}" class="w-full h-full object-cover"/>`}
                        </div>`;
                });
            });
        }

        function deletePost(id) { if(confirm("Delete?")) db.ref('posts/' + id).remove(); }
        function loadOrders(uid) { /* Order Logic Sync Here */ }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
