<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Sainiwalaa Creator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#fafafa}
.header{background:white;padding:15px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd}
.container{max-width:700px;margin:auto;background:white;padding:15px}
.profile{padding:20px;text-align:center}
.avatar{width:90px;height:90px;border-radius:50%;object-fit:cover}
button,input,select,textarea{padding:8px;margin:5px;border:1px solid #ccc;border-radius:6px;width:100%}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:20px}
.post{height:150px;background-size:cover;background-position:center;position:relative}
.post-overlay{position:absolute;bottom:0;background:rgba(0,0,0,0.5);color:white;width:100%;font-size:12px;padding:2px;text-align:center}
.info{font-size:12px;color:#777;margin-top:10px}
.form-section{margin-top:20px;background:#f9f9f9;padding:10px;border-radius:8px}
</style>
</head>
<body>

<div class="header">
<b>Sainiwalaa</b>
<div>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="container">
<div class="profile">
<img id="avatar" class="avatar" src="https://via.placeholder.com/90">
<h3 id="name">Creator</h3>
<div class="info"><span id="uid"></span></div>
</div>

<div class="form-section" id="postForm" style="display:none">
<h4>Upload Product / Video</h4>
<input type="text" id="shopName" placeholder="Shop Name" readonly>
<input type="file" id="fileInput" accept="image/*,video/*">
<input type="text" id="videoLink" placeholder="Or Embed Video Link">
<input type="number" id="price" placeholder="Product Price">
<select id="platform">
  <option value="">Select Platform</option>
  <option value="Amazon">Amazon</option>
  <option value="Meesho">Meesho</option>
  <option value="Other">Other</option>
</select>
<textarea id="description" placeholder="Description"></textarea>
<input type="text" id="productLink" placeholder="Product Link">
<label><input type="checkbox" id="influenceContact"> Influence Contact Yes/No</label>
<button onclick="savePost()">Save Post</button>
</div>

<h4>Public Feed</h4>
<div class="grid" id="postGrid"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
  authDomain: "sainiwalaainfulencer.firebaseapp.com",
  databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
  projectId: "sainiwalaainfulencer",
  storageBucket: "sainiwalaainfulencer.firebasestorage.app",
  messagingSenderId: "116125275008",
  appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const storage = firebase.storage();
const db = firebase.database();

// Google Sheet API
const SHEET_API = "https://script.google.com/macros/s/AKfycbxSg4X4HYjUoX9rfmnjU9lBUyv0aKtJB_pAp0K9z3A5NMHrhASg3aTNz-H3JnOa1twurA/exec";

// Auth
function login(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function logout(){ auth.signOut(); }

// Auth listener
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("name").innerText=user.displayName;
    document.getElementById("avatar").src=user.photoURL;
    document.getElementById("uid").innerText="UID: "+user.uid;
    document.getElementById("postForm").style.display="block";
    loadShopName(user.uid);
  } else {
    document.getElementById("name").innerText="Creator";
    document.getElementById("avatar").src="https://via.placeholder.com/90";
    document.getElementById("uid").innerText="";
    document.getElementById("postForm").style.display="none";
  }
});

// Load shop name from Sheet
function loadShopName(uid){
  fetch(SHEET_API)
  .then(r=>r.json())
  .then(data=>{
    const row = data.find(r=>r[0]==uid);
    if(row) document.getElementById("shopName").value=row[1];
  });
}

// Upload + save
document.getElementById("fileInput").addEventListener("change", function(){
  const file=this.files[0]; const user=auth.currentUser;
  if(!file||!user) return;
  const ref=storage.ref("posts/"+user.uid+"/"+Date.now());
  ref.put(file).then(s=>{
    s.ref.getDownloadURL().then(url=>{
      document.getElementById("videoLink").value=url;
      alert("Video Uploaded Successfully!");
    });
  });
});

// Save Post
function savePost(){
  const user=auth.currentUser;
  if(!user) return alert("Login First!");
  const post={
    uid: user.uid,
    shopName: document.getElementById("shopName").value,
    videoLink: document.getElementById("videoLink").value,
    price: document.getElementById("price").value,
    platform: document.getElementById("platform").value,
    description: document.getElementById("description").value,
    productLink: document.getElementById("productLink").value,
    influenceContact: document.getElementById("influenceContact").checked?"Yes":"No",
    timestamp: new Date().toISOString()
  };
  
  // Save to Firebase Realtime DB
  const id=Date.now();
  db.ref("posts/"+id).set(post);

  // Optional: Save to Google Sheet API
  fetch(SHEET_API+"?action=addPost",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(post)
  });

  alert("Post Saved Successfully!");
  showPost(post);
}

// Show post in grid
function showPost(post){
  const grid=document.getElementById("postGrid");
  const div=document.createElement("div"); div.className="post";
  div.style.backgroundImage="url("+post.videoLink+")";
  const overlay=document.createElement("div"); overlay.className="post-overlay";
  overlay.innerText=post.shopName+" | ₹"+post.price;
  div.appendChild(overlay);
  grid.prepend(div);
}

// Load all posts (public feed)
db.ref("posts").on("value", snap=>{
  const grid=document.getElementById("postGrid"); grid.innerHTML="";
  snap.forEach(p=>showPost(p.val()));
});
</script>
</body>
</html>
