<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Sainiwalaa | Creator Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .logo-spin { animation: spin 4s linear infinite; }
        .marquee-container { background: #111; overflow: hidden; white-space: nowrap; padding: 10px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .marquee-text { display: inline-block; animation: scrollText 15s linear infinite; color: #0095f6; font-weight: bold; font-size: 14px; }
        
        .listing-card { background: #121212; border: 1px solid #262626; border-radius: 20px; padding: 25px; margin-top: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .input-box { background: #1a1a1a; border: 1px solid #333; padding: 14px; border-radius: 10px; width: 100%; margin-bottom: 15px; color: #fff; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #0095f6; box-shadow: 0 0 10px rgba(0,149,246,0.2); }
        
        .send-btn { background: linear-gradient(45deg, #0095f6, #00d4ff); color: #fff; font-weight: 800; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; display: flex; items-center; justify-content: center; gap: 10px; transition: 0.3s; }
        .send-btn:active { transform: scale(0.95); opacity: 0.8; }
        
        #progress-bar { height: 4px; background: #0095f6; width: 0%; position: fixed; top: 0; left: 0; z-index: 1000; transition: 0.3s; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <div id="auth-section" class="flex flex-col items-center justify-center min-h-screen p-6">
        <h1 class="text-4xl font-black italic mb-8 tracking-tighter">SAINIWALAA</h1>
        <div id="login-container" class="w-full max-w-sm bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
            <input type="email" id="email" class="input-box" placeholder="Email">
            <input type="password" id="pass" class="input-box" placeholder="Password">
            <button onclick="login()" class="send-btn">Login to Dashboard</button>
        </div>
    </div>

    <div id="app-section" class="hidden min-h-screen pb-10">
        
        <header class="p-4 flex justify-between items-center bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-zinc-900">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-cyan-400 rounded-full flex items-center justify-center logo-spin">
                    <i class="fa-solid fa-s text-white text-xl"></i>
                </div>
                <span class="font-black italic text-xl tracking-tighter">SAINIWALAA</span>
            </div>
            <button onclick="logout()" class="text-zinc-500 text-xs font-bold border border-zinc-800 px-3 py-1 rounded-lg">LOGOUT</button>
        </header>

        <div class="marquee-container">
            <div class="marquee-text">
                🔥 BEST MEESHO DEALS • 🛍️ FLIPKART BIG SELL • 📦 AMAZON FINDS • 👗 WOMEN FASHION • 🧸 KIDS SPECIAL • 🚀 PRODUCT GROW • 💸 HUGE DISCOUNTS • 🏷️ TRENDING BLOGS •
            </div>
        </div>

        <main class="max-w-xl mx-auto p-4">
            
            <div class="mt-6 px-2">
                <h2 class="text-2xl font-bold bg-gradient-to-r from-white to-zinc-500 bg-clip-text text-transparent">List Your Product on Blog</h2>
                <p class="text-zinc-500 text-sm mt-1">Fill the details below to grow your product reach.</p>
            </div>

            <div class="listing-card">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Influencer Name</label>
                        <input type="text" id="inf-name" class="input-box" placeholder="Your Name">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Instagram ID</label>
                        <input type="text" id="inf-insta" class="input-box" placeholder="@username">
                    </div>
                </div>

                <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Product Identity</label>
                <input type="text" id="p-name" class="input-box" placeholder="Product Name (e.g. Luxury Watch)">
                
                <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Media (Video/Image)</label>
                <div class="flex gap-2 mb-4">
                    <button onclick="document.getElementById('p-file').click()" class="flex-1 bg-zinc-800 p-3 rounded-lg text-xs font-bold border border-zinc-700">
                        <i class="fa-solid fa-cloud-arrow-up mr-2 text-blue-400"></i>UPLOAD FILE
                    </button>
                    <input type="file" id="p-file" class="hidden" accept="video/*,image/*" onchange="uploadMedia(this)">
                    <input type="text" id="p-url" class="flex-[2] bg-zinc-800 p-3 rounded-lg text-xs outline-none border border-zinc-700" placeholder="Or Paste URL Link">
                </div>

                <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">About Product</label>
                <textarea id="p-desc" class="input-box h-24" placeholder="Write a catchy description..."></textarea>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Price (₹)</label>
                        <input type="number" id="p-price" class="input-box" placeholder="499">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Platform</label>
                        <select id="p-platform" class="input-box">
                            <option>Amazon</option>
                            <option>Meesho</option>
                            <option>Flipkart</option>
                            <option>Myntra</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Buy Link</label>
                <input type="text" id="p-link" class="input-box" placeholder="https://amzn.to/example">

                <button onclick="publishPost()" id="send-btn" class="send-btn mt-4">
                    <i class="fa-solid fa-paper-plane"></i> SEND TO BLOG FEED
                </button>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('app-section').classList.add('hidden');
            }
        });

        function uploadMedia(input) {
            const file = input.files[0];
            if(!file) return;
            const bar = document.getElementById('progress-bar');
            bar.style.width = "20%";
            const storageRef = storage.ref('blog_media/' + Date.now() + "_" + file.name);
            const uploadTask = storageRef.put(file);
            uploadTask.on('state_changed', 
                (snap) => {
                    let p = (snap.bytesTransferred / snap.totalBytes) * 100;
                    bar.style.width = p + "%";
                },
                (err) => alert(err.message),
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then(url => {
                        document.getElementById('p-url').value = url;
                        bar.style.width = "0%";
                        alert("Media Ready!");
                    });
                }
            );
        }

        function publishPost() {
            const infName = document.getElementById('inf-name').value;
            const infInsta = document.getElementById('inf-insta').value;
            const name = document.getElementById('p-name').value;
            const url = document.getElementById('p-url').value;
            const price = document.getElementById('p-price').value;
            const plat = document.getElementById('p-platform').value;
            const link = document.getElementById('p-link').value;

            if(!name || !url || !price || !infName) return alert("Please fill Name and Product details!");

            const postId = db.ref('posts').push().key;
            const postData = {
                postId: postId,
                uid: auth.currentUser.uid,
                influencerName: infName,
                influencerInsta: infInsta,
                productName: name,
                mediaUrl: url,
                description: document.getElementById('p-desc').value,
                price: price,
                platform: plat,
                buyLink: link,
                timestamp: Date.now()
            };

            db.ref('posts/' + postId).set(postData).then(() => {
                alert("🚀 Post Published with Influencer Details!");
                document.getElementById('p-name').value = "";
                document.getElementById('p-url').value = "";
            });
        }

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
