<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Sainiwalaa Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .ig-input { background: #121212; border: 1px solid #363636; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; color: #fff; outline: none; }
        .btn-primary { background: #0095f6; color: white; font-weight: bold; padding: 10px; border-radius: 8px; width: 100%; transition: 0.3s; }
        .btn-primary:active { opacity: 0.7; }
        .modal-up { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: #121212; z-index: 1000; transition: 0.4s; border-radius: 20px 20px 0 0; padding: 20px; border-top: 1px solid #262626; }
        .modal-up.active { bottom: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl italic font-serif mb-10 tracking-widest text-white">SAINIWALAA</h1>
        <div class="w-full max-w-sm space-y-4">
            <button onclick="googleAuth()" class="btn-primary flex items-center justify-center gap-3">
                <i class="fa-brands fa-google"></i> Continue with Google
            </button>
            <div class="flex items-center my-4 opacity-40"><hr class="flex-1 border-zinc-700"/><span class="px-4 text-xs font-bold">OR</span><hr class="flex-1 border-zinc-700"/></div>
            <input id="email" class="ig-input" placeholder="Email"/>
            <input id="pass" class="ig-input" placeholder="Password" type="password"/>
            <div class="flex gap-2">
                <button onclick="emailAuth('login')" class="btn-primary">Log In</button>
                <button onclick="emailAuth('reg')" class="bg-zinc-800 text-white font-bold p-2 rounded-lg flex-1">Sign Up</button>
            </div>
            <p onclick="resetPass()" class="text-center text-xs text-[#0095f6] font-bold cursor-pointer mt-4">Forgot password?</p>
        </div>
    </div>

    <div id="main-content" class="hidden pb-20">
        <header class="p-4 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black z-50">
            <span id="display-username" class="font-bold text-lg">creator_studio</span>
            <i class="fa-solid fa-right-from-bracket text-red-500 text-xl" onclick="logout()"></i>
        </header>

        <div class="p-4 flex items-center gap-6">
            <div class="w-20 h-20 rounded-full p-1 bg-gradient-to-tr from-yellow-400 to-purple-600">
                <img id="p-avatar" class="w-full h-full rounded-full border-2 border-black object-cover" src="https://via.placeholder.com/150"/>
            </div>
            <div class="flex-1">
                <h2 id="p-name" class="font-bold">Creator Name</h2>
                <p id="p-bio" class="text-sm text-zinc-400">Loading bio...</p>
                <button onclick="openModal('edit-modal')" class="mt-2 bg-zinc-800 text-xs font-bold px-4 py-1 rounded">Edit Profile</button>
            </div>
        </div>

        <div id="feed-grid" class="grid grid-cols-3 gap-1 mt-4">
            </div>
    </div>

    <div id="edit-overlay" class="overlay" onclick="closeModal('edit-modal')"></div>
    <div id="edit-modal" class="modal-up">
        <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
            <span onclick="closeModal('edit-modal')">Cancel</span>
            <b class="text-lg">Edit Profile</b>
            <span class="text-[#0095f6] font-bold" onclick="updateProfile()">Done</span>
        </div>
        <input id="edit-name" class="ig-input" placeholder="Full Name"/>
        <textarea id="edit-bio" class="ig-input h-24" placeholder="Bio"></textarea>
        <input id="edit-pic" class="ig-input" placeholder="Profile Pic URL"/>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. Auth Observer
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                checkAndCreateUser(user);
                loadProfile(user.uid);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        // 2. Google Login
        function googleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert(e.message));
        }

        // 3. Email Login/Signup
        function emailAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Fields cannot be empty");
            
            if(type === 'login') {
                auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
            } else {
                auth.createUserWithEmailAndPassword(e,p).then(res => {
                    db.ref('users/' + res.user.uid).set({
                        name: e.split('@')[0],
                        bio: "Artist & Creator",
                        pic: "https://via.placeholder.com/150"
                    });
                }).catch(err => alert(err.message));
            }
        }

        // 4. Reset Password
        function resetPass() {
            const e = document.getElementById('email').value;
            if(!e) return alert("Enter email first");
            auth.sendPasswordResetEmail(e).then(() => alert("Reset link sent to email!"));
        }

        // 5. Check if profile exists
        function checkAndCreateUser(user) {
            const userRef = db.ref('users/' + user.uid);
            userRef.once('value', snap => {
                if(!snap.exists()) {
                    userRef.set({
                        name: user.displayName || "New Creator",
                        bio: "Welcome to my studio",
                        pic: user.photoURL || "https://via.placeholder.com/150"
                    });
                }
            });
        }

        // 6. Load & Update Profile
        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('p-name').innerText = data.name;
                document.getElementById('display-username').innerText = data.name.toLowerCase().replace(/\s/g, '_');
                document.getElementById('p-bio').innerText = data.bio;
                document.getElementById('p-avatar').src = data.pic;
            });
        }

        function updateProfile() {
            const uid = auth.currentUser.uid;
            const n = document.getElementById('edit-name').value;
            const b = document.getElementById('edit-bio').value;
            const p = document.getElementById('edit-pic').value;
            
            db.ref('users/' + uid).update({
                name: n || document.getElementById('p-name').innerText,
                bio: b || document.getElementById('p-bio').innerText,
                pic: p || document.getElementById('p-avatar').src
            }).then(() => closeModal('edit-modal'));
        }

        function logout() { if(confirm("Logout from Studio?")) auth.signOut(); }
        function openModal(id) { document.getElementById(id).classList.add('active'); document.getElementById('edit-overlay').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); document.getElementById('edit-overlay').classList.remove('active'); }
    </script>
</body>
</html>
