<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Sainiwalaa | Creator Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .ig-input { background: #121212; border: 1px solid #363636; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; color: #fff; outline: none; font-size: 14px; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 95%; background: #121212; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .tab-btn { flex: 1; text-align: center; padding: 15px; border-bottom: 2px solid transparent; color: #8e8e8e; cursor: pointer; }
        .tab-btn.active { border-bottom-color: #fff; color: #fff; }
        #loader { height: 3px; background: #0095f6; width: 0%; position: fixed; top: 0; left: 0; z-index: 9999; transition: 0.3s; }
        .profile-banner { height: 140px; position: relative; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
        .profile-pic-container { position: relative; width: 85px; height: 85px; margin-top: -42px; margin-left: 15px; z-index: 10; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #000; object-fit: cover; background: #222; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <div id="auth-layer" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-6">
        <h1 class="text-4xl italic font-bold mb-10 tracking-widest">SAINIWALAA</h1>
        <button onclick="login()" class="w-full max-w-xs bg-white text-black font-bold p-3 rounded-lg flex items-center justify-center gap-3">
            <i class="fa-brands fa-google"></i> Login with Google
        </button>
    </div>

    <div id="app" class="hidden">
        <header class="p-4 flex justify-between items-center sticky top-0 bg-black z-50">
            <span class="font-bold text-xl" id="shop-label-header">Studio</span>
            <div class="flex gap-5">
                <i class="fa-regular fa-square-plus text-2xl" onclick="openModal('upload-modal')"></i>
                <i class="fa-solid fa-power-off text-red-500 text-xl" onclick="logout()"></i>
            </div>
        </header>

        <div id="p-banner" class="profile-banner">
            <span id="p-banner-text">Welcome to Studio</span>
            <img id="p-banner-img" src="" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        
        <div class="flex items-start px-4">
            <div class="profile-pic-container">
                <img id="p-user-img" src="" class="profile-pic">
            </div>
            <div class="flex flex-1 pt-2 justify-around text-center">
                <div><span class="block font-bold" id="post-count">0</span><span class="text-xs text-zinc-500">Posts</span></div>
                <div><span class="block font-bold">0</span><span class="text-xs text-zinc-500">Orders</span></div>
                <div><span class="block font-bold">PRO</span><span class="text-xs text-zinc-500">Badge</span></div>
            </div>
        </div>

        <div class="px-4 mt-2">
            <h2 id="p-name" class="font-bold">---</h2>
            <p id="p-bio" class="text-sm text-zinc-400">Bio loading...</p>
        </div>

        <div class="flex border-b border-zinc-900 mt-6 sticky top-[60px] bg-black z-40">
            <div id="tab-feed" class="tab-btn active" onclick="switchTab('feed')"><i class="fa-solid fa-table-cells text-xl"></i></div>
            <div id="tab-orders" class="tab-btn" onclick="switchTab('orders')"><i class="fa-solid fa-cart-shopping text-xl"></i></div>
            <div id="tab-settings" class="tab-btn" onclick="switchTab('settings')"><i class="fa-solid fa-gear text-xl"></i></div>
        </div>

        <div id="section-feed" class="grid grid-cols-3 gap-0.5 pb-20"></div>

        <div id="section-orders" class="hidden p-10 text-center opacity-50">
            <i class="fa-solid fa-box-open text-5xl mb-3"></i>
            <p>No Orders Found</p>
        </div>

        <div id="section-settings" class="hidden p-4 pb-20">
            <div class="bg-zinc-900 p-4 rounded-xl space-y-4">
                <input id="edit-shopName" class="ig-input" placeholder="Shop Name"/>
                <textarea id="edit-bio" class="ig-input h-20" placeholder="Studio Bio"></textarea>
                <input id="edit-city" class="ig-input" placeholder="City"/>
                <input id="edit-contact" class="ig-input" placeholder="Contact Number"/>
                <button onclick="updateProfile()" id="update-btn" class="w-full bg-blue-600 font-bold py-3 rounded-lg">Update Profile</button>
            </div>
        </div>
    </div>

    <div id="upload-modal" class="modal">
        <div class="flex justify-between items-center mb-6">
            <span onclick="closeModal('upload-modal')" class="text-zinc-400">Cancel</span>
            <b class="text-lg">New Post</b>
            <button onclick="savePost()" id="post-btn" class="text-blue-500 font-bold">Share</button>
        </div>
        
        <div class="space-y-3">
            <div class="bg-zinc-900 border-2 border-dashed border-zinc-700 rounded-xl p-6 text-center">
                <input type="file" id="post-file" class="hidden" accept="video/*,image/*" onchange="handleFileUpload(this, 'post-videoUrl')"/>
                <div onclick="document.getElementById('post-file').click()" class="cursor-pointer">
                    <i class="fa-solid fa-video text-2xl text-blue-500"></i>
                    <p class="text-xs mt-2 text-zinc-400" id="upload-status">Upload Video (Max 90s) or Image</p>
                </div>
                <div class="mt-3 flex items-center gap-2">
                    <div class="h-[1px] bg-zinc-800 flex-1"></div>
                    <span class="text-[10px] text-zinc-600 uppercase">Or Paste Link</span>
                    <div class="h-[1px] bg-zinc-800 flex-1"></div>
                </div>
                <input id="post-videoUrl" class="ig-input mt-3 mb-0" placeholder="Paste Direct Media URL"/>
            </div>

            <input id="post-productName" class="ig-input" placeholder="Product Name *"/>
            <div class="grid grid-cols-2 gap-2">
                <input id="post-price" class="ig-input" placeholder="Price (₹) *"/>
                <select id="post-platform" class="ig-input">
                    <option value="Amazon">Amazon</option>
                    <option value="Flipkart">Flipkart</option>
                    <option value="Myntra">Myntra</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <input id="post-productLink" class="ig-input" placeholder="Product Buy Link *"/>
            <textarea id="post-description" class="ig-input h-20" placeholder="Product Description..."></textarea>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        let currentShopName = "";

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                initUser(user);
                loadFeed(user.uid);
            } else {
                document.getElementById('auth-layer').style.display = 'flex';
                document.getElementById('app').classList.add('hidden');
            }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { if(confirm("Logout?")) auth.signOut(); }

        function initUser(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                if(data) {
                    currentShopName = data.shopName;
                    document.getElementById('p-name').innerText = data.name;
                    document.getElementById('p-user-img').src = data.pic;
                    document.getElementById('p-bio').innerText = data.bio || "Welcome to my Studio";
                    document.getElementById('shop-label-header').innerText = data.shopName;
                    
                    // Fill Settings
                    document.getElementById('edit-shopName').value = data.shopName;
                    document.getElementById('edit-bio').value = data.bio || "";
                    document.getElementById('edit-city').value = data.city || "";
                } else {
                    db.ref('users/' + user.uid).set({
                        uid: user.uid, name: user.displayName, pic: user.photoURL,
                        shopName: user.displayName.split(' ')[0] + " Studio",
                        createdAt: new Date().toLocaleDateString()
                    });
                }
            });
        }

        function handleFileUpload(input, targetId) {
            const file = input.files[0];
            if(!file) return;
            
            // 90 Seconds Check for Video
            if(file.type.includes('video')) {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = function() {
                    window.URL.revokeObjectURL(video.src);
                    if (video.duration > 91) {
                        alert("Video is too long! Max 90 seconds.");
                        input.value = "";
                        return;
                    }
                    startUpload(file, targetId);
                }
                video.src = URL.createObjectURL(file);
            } else {
                startUpload(file, targetId);
            }
        }

        function startUpload(file, targetId) {
            const ldr = document.getElementById('loader');
            const status = document.getElementById('upload-status');
            ldr.style.width = "30%";
            status.innerText = "Uploading... Please wait";
            
            const ref = storage.ref('posts/' + auth.currentUser.uid + "/" + Date.now() + "_" + file.name);
            ref.put(file).then(s => s.ref.getDownloadURL().then(url => {
                document.getElementById(targetId).value = url;
                ldr.style.width = "100%";
                status.innerText = "✅ Upload Success: " + file.name;
                setTimeout(() => { ldr.style.width = "0%"; }, 1000);
            }));
        }

        function savePost() {
            const url = document.getElementById('post-videoUrl').value;
            const name = document.getElementById('post-productName').value;
            const price = document.getElementById('post-price').value;
            const link = document.getElementById('post-productLink').value;

            if(!url || !name || !price || !link) return alert("Please fill all * fields");

            const postId = "POST_" + Date.now();
            const postData = {
                postId: postId,
                uid: auth.currentUser.uid,
                shopName: currentShopName,
                videoUrl: url,
                productName: name,
                price: price,
                platform: document.getElementById('post-platform').value,
                productLink: link,
                description: document.getElementById('post-description').value,
                timestamp: Date.now()
            };

            db.ref('posts/' + postId).set(postData).then(() => {
                alert("Post Shared Successfully!");
                closeModal('upload-modal');
                // Reset fields
                document.getElementById('post-videoUrl').value = "";
                document.getElementById('post-productName').value = "";
            });
        }

        function loadFeed(uid) {
            db.ref('posts').orderByChild('uid').equalTo(uid).on('value', snap => {
                const container = document.getElementById('section-feed');
                container.innerHTML = "";
                let count = 0;
                snap.forEach(child => {
                    count++;
                    const p = child.val();
                    const isVid = p.videoUrl.includes(".mp4") || p.videoUrl.includes("video") || p.videoUrl.includes("alt=media");
                    container.innerHTML += `
                        <div class="aspect-square relative bg-zinc-900 border-[0.5px] border-black">
                            ${isVid ? `<video src="${p.videoUrl}" class="w-full h-full object-cover"></video>` : `<img src="${p.videoUrl}" class="w-full h-full object-cover"/>`}
                            <button onclick="deletePost('${p.postId}')" class="absolute top-1 right-1 bg-black/50 p-1 rounded text-[10px] text-red-400">Delete</button>
                        </div>`;
                });
                document.getElementById('post-count').innerText = count;
            });
        }

        function deletePost(id) { if(confirm("Delete this post?")) db.ref('posts/' + id).remove(); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('#section-feed, #section-orders, #section-settings').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('section-' + tab).classList.remove('hidden');
        }

        function updateProfile() {
            const updates = {
                shopName: document.getElementById('edit-shopName').value,
                bio: document.getElementById('edit-bio').value,
                city: document.getElementById('edit-city').value,
                contact: document.getElementById('edit-contact').value
            };
            db.ref('users/' + auth.currentUser.uid).update(updates).then(() => alert("Profile Updated"));
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
